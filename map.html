<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corpus Map — archAIology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#1c1814; --cream:#faf8f3; --ochre:#b8892a; --ash:#8a8070;
  --forest:#2a3d2e; --rule:#d5ccb8; --linen:#e8e0d0;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:var(--sans);}

/* ── MASTHEAD ── */
.masthead{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--ink);height:44px;
  display:flex;align-items:center;padding:0 1.2rem;gap:1.5rem;
}
.logo{font-family:var(--serif);font-size:1.1rem;font-weight:900;color:var(--cream);text-decoration:none;}
.logo span{color:var(--ochre);font-style:italic;}
.nav-link{font-family:var(--sans);font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ash);text-decoration:none;transition:color .2s;}
.nav-link:hover,.nav-link.active{color:var(--cream);}
.masthead-right{margin-left:auto;display:flex;align-items:center;gap:1rem;}
.map-stats{font-family:var(--sans);font-size:.65rem;color:var(--ash);}
.map-stats strong{color:var(--ochre);}

/* ── MAP ── */
#map{position:fixed;top:44px;left:0;right:0;bottom:0;}

/* ── CONTROLS ── */
.map-controls{
  position:fixed;top:56px;left:12px;z-index:50;
  display:flex;flex-direction:column;gap:6px;
}
.ctrl-card{
  background:rgba(15,13,10,.88);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(8px);
  padding:.6rem .8rem;
  min-width:180px;
}
.ctrl-label{
  font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ochre);margin-bottom:.5rem;
}
.tier-row{
  display:flex;align-items:center;gap:.5rem;
  padding:.25rem 0;cursor:pointer;
}
.tier-dot{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,.2);
}
.tier-label{font-size:.68rem;color:rgba(232,224,208,.8);}
.tier-count{margin-left:auto;font-size:.58rem;font-weight:700;color:var(--ochre);}
.ctrl-sep{height:1px;background:rgba(255,255,255,.06);margin:.3rem 0;}
.filter-chip{
  font-size:.6rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:.2rem .5rem;border:1px solid rgba(255,255,255,.12);
  background:none;color:var(--ash);cursor:pointer;border-radius:2px;
  transition:all .15s;white-space:nowrap;
}
.filter-chip:hover{color:var(--cream);border-color:rgba(255,255,255,.3);}
.filter-chip.active{background:rgba(184,137,42,.2);color:var(--ochre);border-color:var(--ochre);}
.filter-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:.3rem;}

/* ── DETAIL PANEL ── */
.detail-panel{
  position:fixed;right:0;top:44px;bottom:0;width:340px;
  background:var(--ink);border-left:1px solid rgba(255,255,255,.08);
  overflow-y:auto;transform:translateX(100%);
  transition:transform .3s ease;z-index:60;
}
.detail-panel.open{transform:translateX(0);}
.detail-close{
  position:absolute;top:.8rem;right:.8rem;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:var(--ash);width:28px;height:28px;cursor:pointer;border-radius:2px;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.detail-close:hover{color:var(--cream);background:rgba(255,255,255,.12);}
.detail-header{padding:1.2rem 1.2rem .8rem;}
.detail-tier{
  font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:.4rem;
}
.detail-name{
  font-family:var(--serif);font-size:1.4rem;font-weight:900;
  color:var(--cream);line-height:1.2;margin-bottom:.5rem;
}
.detail-badges{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.8rem;}
.badge{
  font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:.15rem .45rem;border-radius:2px;
}
.badge-culture{background:rgba(184,137,42,.15);color:var(--ochre);}
.badge-region{background:rgba(42,61,46,.3);color:#7ab890;}
.badge-period{background:rgba(255,255,255,.06);color:var(--ash);}
.detail-desc{
  font-family:'Georgia',serif;font-size:.82rem;line-height:1.6;
  color:rgba(232,224,208,.65);padding:.8rem 1.2rem;
  border-top:1px solid rgba(255,255,255,.05);
}
.detail-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:rgba(255,255,255,.05);margin:.8rem 0 0;
  border-top:1px solid rgba(255,255,255,.05);
}
.stat-cell{
  background:var(--ink);padding:.7rem 1.2rem;
}
.stat-num{font-family:var(--serif);font-size:1.4rem;font-weight:900;color:var(--ochre);display:block;line-height:1;}
.stat-lbl{font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ash);margin-top:.15rem;}
.detail-section{padding:.8rem 1.2rem;border-top:1px solid rgba(255,255,255,.05);}
.section-label{font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ochre);margin-bottom:.6rem;}
.mention-item{padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.04);}
.mention-item:last-child{border-bottom:none;}
.mention-title{font-size:.8rem;font-weight:600;color:rgba(232,224,208,.8);line-height:1.35;margin-bottom:.2rem;}
.mention-title a{color:inherit;text-decoration:none;}
.mention-title a:hover{color:var(--ochre);}
.mention-meta{font-size:.62rem;color:var(--ash);}
.topos-block{
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  background:rgba(42,61,46,.3);padding:.8rem 1.2rem;
  border-top:1px solid rgba(255,255,255,.05);
}
.topos-num{font-family:var(--serif);font-size:1.6rem;font-weight:900;color:var(--ochre);}
.topos-lbl{font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(232,224,208,.5);margin-top:.1rem;}
.topos-btn{
  font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ochre);border:1px solid rgba(184,137,42,.35);
  padding:.3rem .7rem;text-decoration:none;transition:all .2s;white-space:nowrap;
}
.topos-btn:hover{background:rgba(184,137,42,.15);}
.ext-links{display:flex;gap:.5rem;padding:.8rem 1.2rem;border-top:1px solid rgba(255,255,255,.05);}
.ext-link{
  font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ash);border:1px solid rgba(255,255,255,.1);
  padding:.25rem .6rem;text-decoration:none;transition:all .2s;border-radius:2px;
}
.ext-link:hover{color:var(--ochre);border-color:var(--ochre);}
.site-page-btn{
  display:block;margin:.8rem 1.2rem;
  background:rgba(184,137,42,.15);border:1px solid rgba(184,137,42,.3);
  color:var(--ochre);font-size:.65rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:.5rem;text-align:center;
  text-decoration:none;transition:all .2s;
}
.site-page-btn:hover{background:rgba(184,137,42,.25);}

/* ── SEARCH ── */
.search-wrap{
  position:fixed;top:56px;right:352px;z-index:50;
}
.search-input{
  background:rgba(15,13,10,.88);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(8px);color:var(--cream);
  font-family:var(--sans);font-size:.75rem;
  padding:.4rem .8rem .4rem 2rem;width:220px;outline:none;
  transition:all .2s;
}
.search-input:focus{border-color:var(--ochre);width:280px;}
.search-input::placeholder{color:var(--ash);}
.search-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--ash);font-size:.7rem;pointer-events:none;}

/* ── LOADING ── */
.map-loading{
  position:fixed;inset:0;top:44px;
  background:rgba(15,13,10,.9);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:200;gap:1rem;
}
.loading-dots span{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--ochre);margin:0 3px;
  animation:ldot 1.2s ease infinite;
}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes ldot{0%,100%{opacity:.2;transform:translateY(0)}50%{opacity:1;transform:translateY(-5px)}}
.loading-text{font-family:var(--sans);font-size:.78rem;color:var(--ash);}
</style>
</head>

  <a href="index.html" class="logo">arch<span>AI</span>ology</a>
  <a class="nav-link" href="index.html">Home</a>
  <a class="nav-link" href="news.html">Feed</a>
  <a class="nav-link active" href="map.html">Map</a>
  <a class="nav-link" href="conferences.html">Conferences</a>
  <div class="masthead-right">

      <strong id="statSites">—</strong> sites &nbsp;·&nbsp;
      <strong id="statMentions">—</strong> mapped
    </div>
  </div>

<!-- MAP -->
<div id="map"></div>

<!-- LOADING -->
<div class="map-loading" id="mapLoading">
  <div class="loading-dots"><span></span><span></span><span></span></div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">

  <div class="detail-stats">

      <span class="stat-num" id="detailMentions">0</span>
      <div class="stat-lbl">Modern papers</div>
    </div>

      <div class="stat-lbl">Ancient refs</div>
    </div>
  </div>
  <div id="detailTopos" style="display:none">

<script>
// ── CONFIG ────────────────────────────────────────────────────
const SUPABASE_URL      = "https://ucsgtbpeuqeamuvuvojs.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjc2d0YnBldXFlYW11dnV2b2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzI1ODgsImV4cCI6MjA4OTU0ODU4OH0.X6xIwg0CD6jPY8OQBCL6PejepmUeztUZQwolrfCmHXA";
const PAGE_SIZE = 1000; // sites per fetch

// ── TIER LOGIC ────────────────────────────────────────────────
// Tier 1: ancient_refs > 500 OR mention_count > 5  → always visible
// Tier 2: ancient_refs 50-500 OR mention_count 2-5 → visible zoom 3+
// Tier 3: ancient_refs 1-50 OR known named sites   → visible zoom 5+
// Tier 4: ancient_refs 0, ports/minor              → visible zoom 7+

function getSiteTier(site) {
  const refs  = site.ancient_refs  ?? 0;
  const ments = site.mention_count ?? 0;
  if (refs > 500 || ments > 5)  return 1;
  if (refs > 50  || ments > 1)  return 2;
  if (refs > 0   || ments > 0)  return 3;
  // Subregion-based defaults
  if (site.subregion === 'mithraic' || site.subregion === 'adriatic' ||
      site.subregion === 'black_sea') return 4;
  if (site.culture === 'Ancient Mediterranean') return 4; // Ancient Ports bulk
  return 3;
}

const TIER_COLORS  = { 1:'#f4a234', 2:'#d4a84b', 3:'#a07840', 4:'#6a5230' };
const TIER_SIZES   = { 1:10, 2:7, 3:5, 4:3 };
const TIER_MIN_ZOOM= { 1:0, 2:3, 3:5, 4:7 };
const TIER_LABELS  = { 1:'Major site', 2:'Regional center', 3:'Archaeological site', 4:'Port / minor site' };

// ── STATE ─────────────────────────────────────────────────────
let map, allSites = [], allMarkers = [], corpusMap = {};
let activeRegion = 'all', mentionedOnly = false, searchTerm = '';
let currentZoom = 3;

// ── SUPABASE FETCH ────────────────────────────────────────────
async function sbFetch(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
  });
  if (!res.ok) throw new Error(`Supabase ${res.status}`);
  return res.json();
}

// ── LOAD ALL SITES (paginated) ────────────────────────────────
async function loadAllSites() {
  document.getElementById('loadingText').textContent = 'Loading sites…';
  let offset = 0, batch;
  do {
    batch = await sbFetch(
      `archaeology_sites?select=id,name,region,subregion,culture,period,lat,lng,country,description,wikipedia_url,topostext_url,ancient_refs` +
      `&limit=${PAGE_SIZE}&offset=${offset}&order=ancient_refs.desc`
    );
    allSites.push(...batch);
    offset += PAGE_SIZE;
    document.getElementById('loadingText').textContent =
      `Loading sites… ${allSites.length.toLocaleString()}`;
  } while (batch.length === PAGE_SIZE);
  return allSites;
}

// ── LOAD CORPUS MAP ───────────────────────────────────────────
async function loadCorpusMap() {
  document.getElementById('loadingText').textContent = 'Loading corpus…';
  const rows = await sbFetch(
    `corpus_map?select=site_id,mention_count,latest_title,latest_url,latest_source`
  );
  rows.forEach(r => { corpusMap[r.site_id] = r; });
}

// ── CREATE MARKER ─────────────────────────────────────────────
function createMarker(site) {
  const corpus = corpusMap[site.id] ?? {};
  const mentionCount = corpus.mention_count ?? 0;
  const tier  = getSiteTier({ ...site, mention_count: mentionCount });
  const color = TIER_COLORS[tier];
  const size  = TIER_SIZES[tier];

  const marker = new google.maps.Marker({
    position: { lat: site.lat, lng: site.lng },
    map:      null, // hidden until filter applied
    title:    site.name,
    icon: {
      path:          google.maps.SymbolPath.CIRCLE,
      scale:         size,
      fillColor:     color,
      fillOpacity:   mentionCount > 0 ? 1.0 : 0.65,
      strokeColor:   mentionCount > 0 ? '#ffffff' : 'rgba(255,255,255,0.2)',
      strokeWeight:  mentionCount > 0 ? 1.5 : 0.5,
    },
    zIndex: tier === 1 ? 10 : tier === 2 ? 5 : 2,
  });

  marker._site    = site;
  marker._tier    = tier;
  marker._corpus  = corpus;

  marker.addListener('click', () => showDetail(site, corpus));
  return marker;
}

// ── APPLY FILTERS ─────────────────────────────────────────────
function applyFilters() {
  const zoom = map.getZoom();
  currentZoom = zoom;

  let shown = 0;
  allMarkers.forEach(m => {
    const s    = m._site;
    const tier = m._tier;

    // Tier visibility by zoom
    const tierVisible = zoom >= TIER_MIN_ZOOM[tier];

    // Region filter
    const regionOk = activeRegion === 'all' || s.region === activeRegion;

    // Mentions filter
    const mentionOk = !mentionedOnly || (m._corpus?.mention_count ?? 0) > 0;

    // Search filter
    const searchOk = !searchTerm ||
      s.name.toLowerCase().includes(searchTerm) ||
      (s.culture ?? '').toLowerCase().includes(searchTerm);

    const visible = tierVisible && regionOk && mentionOk && searchOk;
    m.setMap(visible ? map : null);
    if (visible) shown++;
  });

  document.getElementById('statSites').textContent = shown.toLocaleString();
}

// ── SHOW DETAIL ───────────────────────────────────────────────
function showDetail(site, corpus) {
  const panel = document.getElementById('detailPanel');
  const tier  = getSiteTier({ ...site, mention_count: corpus?.mention_count ?? 0 });

  document.getElementById('detailTier').textContent = TIER_LABELS[tier];
  document.getElementById('detailTier').style.color = TIER_COLORS[tier];
  document.getElementById('detailName').textContent = site.name;

  // Badges
  const badges = [
    site.culture ? `<span class="badge badge-culture">${site.culture}</span>` : '',
    site.region  ? `<span class="badge badge-region">${regionLabel(site.region)}</span>` : '',
    site.period  ? `<span class="badge badge-period">${site.period}</span>` : '',
    site.country ? `<span class="badge badge-period">${site.country}</span>` : '',
  ].filter(Boolean).join('');
  document.getElementById('detailBadges').innerHTML = badges;

  document.getElementById('detailDesc').textContent = site.description ?? '';
  document.getElementById('detailMentions').textContent = (corpus?.mention_count ?? 0).toString();
  document.getElementById('detailAncientRefs').textContent = (site.ancient_refs ?? 0).toLocaleString();

  // ToposText
  const toposEl = document.getElementById('detailTopos');
  if (site.ancient_refs > 0 && site.topostext_url) {
    toposEl.style.display = 'block';
    document.getElementById('toposNum').textContent = site.ancient_refs.toLocaleString();
    document.getElementById('toposBtn').href = site.topostext_url;
  } else {
    toposEl.style.display = 'none';
  }

  // Mentions
  const mentionsSection = document.getElementById('detailMentionsList');
  const mentionsItems   = document.getElementById('mentionItems');
  if (corpus?.latest_title) {
    mentionsSection.style.display = 'block';
    mentionsItems.innerHTML = `
      <div class="mention-item">
        <div class="mention-title">
          <a href="${corpus.latest_url ?? '#'}" target="_blank">${corpus.latest_title}</a>
        </div>
        <div class="mention-meta">${corpus.latest_source ?? ''}</div>
      </div>`;
  } else {
    mentionsSection.style.display = 'none';
  }

  // External links
  const links = [
    site.wikipedia_url ? `<a class="ext-link" href="${site.wikipedia_url}" target="_blank">Wikipedia ↗</a>` : '',
    site.topostext_url ? `<a class="ext-link" href="${site.topostext_url}" target="_blank">ToposText ↗</a>` : '',
    `<a class="ext-link" href="https://www.google.com/maps/@${site.lat},${site.lng},14z" target="_blank">Maps ↗</a>`,
  ].filter(Boolean).join('');
  document.getElementById('extLinks').innerHTML = links;

  // Site page link
  const siteBtn = document.getElementById('sitePageBtn');
  siteBtn.href = `site.html?id=${encodeURIComponent(site.name)}`;
  siteBtn.style.display = 'block';

  panel.classList.add('open');
}

// ── HELPERS ───────────────────────────────────────────────────
function regionLabel(r) {
  return {europe:'Europe',near_east:'Near East',mesoamerica:'Mesoamerica',
          north_america:'N. America',south_america:'S. America',general:'General'}[r] ?? r;
}

// ── INIT MAP ──────────────────────────────────────────────────
async function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center:    { lat: 35, lng: 18 },
    zoom:      3,
    mapTypeId: 'hybrid',
    styles: [
      { featureType:'all', elementType:'labels.text.fill',
        stylers:[{color:'#c8b890'}] },
      { featureType:'administrative.country', elementType:'geometry.stroke',
        stylers:[{color:'#5a4a30'},{weight:1}] },
      { featureType:'water', elementType:'geometry',
        stylers:[{color:'#0a1a2e'}] },
      { featureType:'landscape', elementType:'geometry',
        stylers:[{color:'#1a1410'}] },
      { featureType:'poi', stylers:[{visibility:'off'}] },
      { featureType:'transit', stylers:[{visibility:'off'}] },
      { featureType:'road', elementType:'geometry',
        stylers:[{color:'#2a2018'},{weight:0.5}] },
    ],
    disableDefaultUI:     true,
    zoomControl:          true,
    zoomControlOptions:   { position: google.maps.ControlPosition.RIGHT_CENTER },
    gestureHandling:      'greedy',
    restriction: {
      latLngBounds: { north:85, south:-85, west:-180, east:180 },
      strictBounds: false,
    },
  });

  // Load data
  try {
    await Promise.all([loadAllSites(), loadCorpusMap()]);
  } catch (err) {
    document.getElementById('loadingText').textContent = 'Error: ' + err.message;
    return;
  }

  document.getElementById('loadingText').textContent = 'Building markers…';

  // Build markers
  allSites.forEach(site => {
    if (!site.lat || !site.lng) return;
    const m = createMarker(site);
    allMarkers.push(m);
  });

  // Tier counts
  [1,2,3,4].forEach(t => {
    document.getElementById(`cnt${t}`).textContent =
      allMarkers.filter(m => m._tier === t).length.toLocaleString();
  });

  // Stats
  const mentioned = Object.keys(corpusMap).length;
  document.getElementById('statMentions').textContent = mentioned;
  document.getElementById('statSites').textContent = allSites.length.toLocaleString();

  // Apply initial filter
  applyFilters();

  // Zoom listener
  map.addListener('zoom_changed', applyFilters);

  // Hide loading
  document.getElementById('mapLoading').style.display = 'none';
}

// ── EVENT LISTENERS ───────────────────────────────────────────
document.getElementById('detailClose').addEventListener('click', () => {
  document.getElementById('detailPanel').classList.remove('open');
});

document.querySelectorAll('[data-region]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('[data-region]').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeRegion = this.dataset.region;
    applyFilters();
  });
});

document.getElementById('mentionedOnly').addEventListener('change', function() {
  mentionedOnly = this.checked;
  applyFilters();
});

let searchTimer;
document.getElementById('siteSearch').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchTerm = this.value.trim().toLowerCase();
    // If searching, show all tiers
    if (searchTerm) {
      allMarkers.forEach(m => {
        const visible = m._site.name.toLowerCase().includes(searchTerm) ||
                        (m._site.culture ?? '').toLowerCase().includes(searchTerm);
        m.setMap(visible ? map : null);
        if (visible && map) {
          map.panTo(m.getPosition());
        }
      });
    } else {
      applyFilters();
    }
  }, 250);
});
</script>
